{% extends "shop/base.html" %}

{% block content %}

<h2>{{ product.title }}</h2>

<p>
    <strong>Бренд:</strong>
    {{ product.brand }}
</p>

<p>
    <strong>Опис:</strong>
    {{ product.description }}
</p>

<p>
    <strong>Ціна:</strong>
    {{ product.price }} грн
</p>

<p>
    <strong>Кількість:</strong>
    {{ product.quantity }}
</p>

<p>
    <strong>Категорія:</strong>
    {{ product.category }}
</p>

<a href="{% url 'product_list' %}">
    Назад до списку
</a>

{% endblock %}
