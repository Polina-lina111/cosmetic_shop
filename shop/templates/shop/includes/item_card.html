<div class="card">

    <h3>{{ product.title }}</h3>

    <p>
        <strong>Бренд:</strong>
        {{ product.brand }}
    </p>

    <p>
        <strong>Категорія:</strong>
        {{ product.category }}
    </p>

    <p>
        <strong>Ціна:</strong>
        {{ product.price }} грн
    </p>

    <a href="{% url 'product_detail' product.pk %}">
        Детальніше
    </a>

</div>

<br>
